<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pago Seguro — VM Tecnología</title>
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo img {
      height: 40px;
    }
    .titulo {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 4px;
    }
    .subtitulo {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-bottom: 24px;
    }
    .monto-box {
      background: #f0f7ff;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      margin-bottom: 24px;
    }
    .monto-label {
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }
    .monto-valor {
      font-size: 32px;
      font-weight: 700;
      color: #009ee3;
    }
    #cardPaymentBrick_container {
      margin-bottom: 16px;
    }
    .loading {
      text-align: center;
      padding: 40px 0;
      color: #888;
      font-size: 14px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #009ee3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .seguro {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: #aaa;
      margin-top: 16px;
    }
    .error-box {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #cc0000;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="160" height="36" viewBox="0 0 160 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="28" font-family="-apple-system,sans-serif" font-size="22" font-weight="700" fill="#009ee3">VM Tecnología</text>
    </svg>
  </div>

  <p class="titulo">Pago Seguro</p>
  <p class="subtitulo">Procesado por Mercado Pago</p>

  <div class="monto-box">
    <p class="monto-label">Total a pagar</p>
    <p class="monto-valor" id="monto-display">Calculando...</p>
  </div>

  <div class="error-box" id="error-box">
    Ocurrió un error al cargar el formulario. Por favor recarga la página.
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Cargando formulario de pago...
  </div>

  <div id="cardPaymentBrick_container"></div>

  <div class="seguro">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Pago seguro con cifrado SSL
  </div>
</div>

<script>
  const PUBLIC_KEY = "APP_USR-65c431f8-571d-4d7f-a193-0bda1ba5bf54";

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  const monto = parseFloat(getParam("amount") || "0");
  const descripcion = getParam("description") || "Pedido VM Tecnología";
  const orden = getParam("order") || "";

  const montoDisplay = document.getElementById("monto-display");
  if (monto > 0) {
    montoDisplay.textContent = "$" + monto.toLocaleString("es-MX", {minimumFractionDigits: 2}) + " MXN";
  } else {
    montoDisplay.textContent = "Monto no especificado";
  }

  const mp = new MercadoPago(PUBLIC_KEY, { locale: "es-MX" });
  const bricksBuilder = mp.bricks();

  const renderCardPaymentBrick = async (bricksBuilder) => {
    try {
      await bricksBuilder.create("cardPayment", "cardPaymentBrick_container", {
        initialization: {
          amount: monto > 0 ? monto : 100,
          payer: { email: getParam("email") || "" }
        },
        customization: {
          visual: { style: { theme: "default" } },
          paymentMethods: { minInstallments: 1, maxInstallments: 12 }
        },
        callbacks: {
          onReady: () => {
            document.getElementById("loading").style.display = "none";
          },
          onSubmit: (cardFormData) => {
            return new Promise((resolve, reject) => {
              fetch("https://mp-proxy.netlify.app/.netlify/functions/process-payment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  ...cardFormData,
                  description: descripcion,
                  external_reference: orden
                })
              })
              .then(r => r.json())
              .then(data => {
                if (data.status === "approved") {
                  window.location.href = "https://tiendasvm.com.mx/gracias?order=" + orden;
                } else {
                  document.getElementById("error-box").style.display = "block";
                  document.getElementById("error-box").textContent = "Pago no aprobado: " + (data.status_detail || "intenta con otra tarjeta");
                  reject();
                }
                resolve();
              })
              .catch(() => {
                document.getElementById("error-box").style.display = "block";
                reject();
              });
            });
          },
          onError: (error) => {
            console.error(error);
            document.getElementById("error-box").style.display = "block";
          }
        }
      });
    } catch(e) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error-box").style.display = "block";
    }
  };

  renderCardPaymentBrick(bricksBuilder);
</script>
</body>
</html>
