<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pago Seguro — VM Tecnología</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
    }
    .titulo { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .subtitulo { font-size: 14px; color: #888; margin-bottom: 24px; }
    .monto-box { background: #f0f7ff; border-radius: 10px; padding: 16px; margin-bottom: 24px; }
    .monto-label { font-size: 13px; color: #555; margin-bottom: 4px; }
    .monto-valor { font-size: 32px; font-weight: 700; color: #009ee3; }
    .btn-pagar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #009ee3;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .btn-pagar:hover { background: #0080c0; }
    .loading { text-align: center; padding: 20px 0; color: #888; font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #009ee3; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .seguro { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: #aaa; margin-top: 12px; }
    .logo-mp { margin-bottom: 20px; }
    .error-box { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #cc0000; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-mp">
    <svg width="140" height="32" viewBox="0 0 140 32" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="24" font-family="-apple-system,sans-serif" font-size="18" font-weight="700" fill="#009ee3">VM Tecnología</text>
    </svg>
  </div>

  <p class="titulo">Pago Seguro</p>
  <p class="subtitulo">Procesado por Mercado Pago</p>

  <div class="monto-box">
    <p class="monto-label">Total a pagar</p>
    <p class="monto-valor" id="monto-display">Cargando...</p>
  </div>

  <div class="error-box" id="error-box">Ocurrió un error. Por favor intenta de nuevo.</div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Preparando tu pago...
  </div>

  <a href="#" id="btn-pagar" class="btn-pagar" style="display:none;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="1" y="4" width="22" height="16" rx="2"/>
      <line x1="1" y1="10" x2="23" y2="10"/>
    </svg>
    Pagar con Mercado Pago
  </a>

  <div class="seguro">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Pago seguro con cifrado SSL
  </div>
</div>

<script>
  const NETLIFY_URL = "https://pagos.tiendasvm.com.mx/.netlify/functions/process-payment";

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  const monto = parseFloat(getParam("amount") || "0");
  const orderName = getParam("order") || "";
  const email = getParam("email") || "";
  const descripcion = getParam("description") || "Pedido VM Tecnología";

  const montoDisplay = document.getElementById("monto-display");
  if (monto > 0) {
    montoDisplay.textContent = "$" + monto.toLocaleString("es-MX", { minimumFractionDigits: 2 }) + " MXN";
  } else {
    montoDisplay.textContent = "Monto no disponible";
  }

  async function crearPreferencia() {
    try {
      const resp = await fetch(NETLIFY_URL + "?action=crear_preferencia", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "crear_preferencia",
          amount: monto,
          description: descripcion,
          order_name: orderName,
          email: email,
          back_url: "https://tiendasvm.com"
        })
      });

      const data = await resp.json();

      if (data.init_point) {
        document.getElementById("loading").style.display = "none";
        const btn = document.getElementById("btn-pagar");
        btn.href = data.init_point;
        btn.style.display = "flex";
      } else {
        throw new Error("No se obtuvo link de pago");
      }
    } catch(e) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error-box").style.display = "block";
      document.getElementById("error-box").textContent = "Error al preparar el pago. Recarga la página.";
    }
  }

  if (monto > 0) {
    crearPreferencia();
  } else {
    document.getElementById("loading").style.display = "none";
  }
</script>
</body>
</html>
